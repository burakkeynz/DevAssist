name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checking out repository...
        uses: actions/checkout@v4

      - name: Setting up Python 3.9...
        uses: actions/setup-python@v5
        with:
          python-version: "3.9"

      - name: Installing flake8...
        run: pip install flake8

      - name: Running flake8 linter on source files...
        run: |
          flake8 app/ eval/ fine_tuning/ \
            --max-line-length=120 \
            --exclude=__pycache__,chroma_db,venv \
            --ignore=E501,W503,E203
